<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VER // EP by St</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#000;--near:#0a0a0a;--dim:#111;--border:#222;
  --mid:#555;--light:#999;--white:#fff;
  --green:#00ff41;--amber:#ffb800;--red:#ff2d2d;
  --r-op:8px;--r-etiq:20px;
}
html,body{height:100dvh;background:var(--black);color:var(--white);font-family:'Courier New',monospace;overflow:hidden;touch-action:none;}
#app{display:flex;flex-direction:column;height:100dvh;position:relative;}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
#logo{font-size:9px;font-weight:700;letter-spacing:0.2em;border:1px solid var(--border);padding:4px 7px;flex-shrink:0;}
#modoActivo{font-size:9px;font-weight:700;letter-spacing:0.15em;color:var(--mid);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:4px;flex-shrink:0;}
#frameCount{font-size:9px;color:var(--mid);letter-spacing:0.1em;flex:1;text-align:center;}
#btnOjo{width:36px;height:36px;border-radius:50%;background:var(--dim);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;opacity:0.4;transition:all 0.2s;}
#btnOjo:hover{opacity:1;}
#btnCanal{background:transparent;border:1px solid #444;color:#666;font-family:'Courier New',monospace;font-size:9px;font-weight:700;letter-spacing:0.1em;padding:4px 8px;cursor:pointer;border-radius:3px;flex-shrink:0;}

/* PANEL MODOS */
#modosPanel{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.94);gap:14px;}
#modosPanel.visible{display:flex;}
.modo-opt{width:220px;padding:14px 20px;border-radius:40px;background:var(--dim);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:14px;color:var(--mid);font-family:'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:0.12em;transition:all 0.15s;}
.modo-opt:hover{border-color:var(--light);color:var(--white);}
.modo-opt.active{border-color:var(--green);color:var(--green);}
.modo-opt img{width:24px;height:24px;filter:invert(0.4);flex-shrink:0;}
.modo-opt.active img{filter:invert(1) sepia(1) saturate(3) hue-rotate(80deg);}
#modosCerrar{margin-top:8px;font-size:9px;letter-spacing:0.15em;color:var(--mid);cursor:pointer;padding:8px 20px;}

/* ZONA CÁMARA */
#cameraZone{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;}
#viewCanvas{image-rendering:pixelated;display:block;pointer-events:none;}
#overlayCanvas{position:absolute;top:0;left:0;cursor:crosshair;}
#video{display:none;}
#cameraOff{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--mid);pointer-events:none;}
#cameraOff .eye{font-size:52px;opacity:0.1;}
#cameraOff p{font-size:10px;letter-spacing:0.18em;opacity:0.4;}
#colorChannel{position:absolute;bottom:8px;right:8px;display:none;}
#colorCanvas{width:56px;height:56px;image-rendering:pixelated;border:1px solid rgba(255,255,255,0.12);display:block;}

/* ESPECTRÓMETRO */
#specPanel{position:fixed;inset:0;z-index:400;background:#000;display:none;flex-direction:column;}
#specPanel.visible{display:flex;}
#specScreen{flex:1;position:relative;background:#0a0800;border-bottom:1px solid #2a2000;overflow:hidden;}
#specCanvas{display:block;width:100%;height:100%;}
#specHud{position:absolute;top:8px;left:44px;font-family:'VT323',monospace;font-size:28px;color:#ff8c00;letter-spacing:.06em;pointer-events:none;line-height:1;}
#specThumb{position:absolute;bottom:10px;right:10px;width:88px;height:66px;border:1.5px solid #00cc33;}
#specThumbCanvas{width:100%;height:100%;image-rendering:pixelated;display:block;}
#specThumbHud{position:absolute;bottom:14px;right:104px;font-family:'VT323',monospace;font-size:18px;color:#00cc33;text-align:right;line-height:1.2;}
#specWheel{position:absolute;left:-8px;top:20%;width:38px;height:60%;background:linear-gradient(90deg,#111,#2e2e2e 35%,#383838 65%,#1a1a1a);border-radius:9px;cursor:ns-resize;z-index:10;touch-action:none;box-shadow:3px 0 10px rgba(0,0,0,0.7);}
#specWheelCanvas{position:absolute;top:0;left:0;border-radius:9px;}

/* Panel inferior espectrómetro */
#specBottom{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0d0a00;flex-shrink:0;}
#specDialWrap{width:110px;height:110px;flex-shrink:0;cursor:grab;touch-action:none;}
#specDialWrap:active{cursor:grabbing;}
#specDialCanvas{display:block;}
#specRight{display:flex;flex-direction:column;gap:6px;flex:1;}
.spec-toggle{display:flex;align-items:center;gap:6px;font-size:9px;color:#444;cursor:pointer;letter-spacing:.1em;user-select:none;}
.spec-dot{width:18px;height:9px;border-radius:5px;background:#1a1a1a;border:1px solid #333;transition:background .2s;flex-shrink:0;}
.spec-dot.on{background:#00ff41;border-color:#00ff41;}
.spec-toggle.on{color:#00ff41;}
#specClose{font-size:9px;color:#444;cursor:pointer;padding:4px 8px;border:1px solid #333;border-radius:3px;letter-spacing:.1em;align-self:flex-start;margin-top:4px;}

/* ETIQUETAS */
#tagStrip{position:fixed;left:6px;overflow-y:auto;overflow-x:visible;display:flex;flex-direction:column;gap:5px;padding:8px 0;scrollbar-width:none;z-index:100;width:160px;}
#tagStrip::-webkit-scrollbar{display:none;}
.etiq-row{display:flex;flex-shrink:0;}
.etiqueta{width:130px;min-width:130px;max-width:130px;padding:10px;border:1px solid #444;border-radius:var(--r-etiq);background:#000;color:#666;font-size:11px;font-weight:700;letter-spacing:0.06em;white-space:nowrap;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:flex-end;gap:8px;transform:translateX(-70px);transition:transform 0.18s ease,border-color 0.18s,color 0.18s,opacity 0.3s;box-sizing:border-box;}
.etiqueta.activa{color:#fff;border-color:#fff;transform:translateX(-40px);}
.etiqueta.atenuada{opacity:0.2;}
.led{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:#1a1a1a;border:1px solid #333;transition:background 0.4s,border-color 0.4s;}
.led.debil{background:#444;border-color:#666;}
.led.media{background:#999;border-color:#bbb;}
.led.fuerte{background:var(--amber);border-color:var(--amber);}
@keyframes sonar{0%{box-shadow:0 0 0 0 rgba(255,184,0,0.8)}70%{box-shadow:0 0 0 12px rgba(255,184,0,0)}100%{box-shadow:0 0 0 0 rgba(255,184,0,0)}}
@keyframes sonar-media{0%{box-shadow:0 0 0 0 rgba(180,180,180,0.5)}70%{box-shadow:0 0 0 8px rgba(180,180,180,0)}100%{box-shadow:0 0 0 0 rgba(180,180,180,0)}}
.led.pulso-fuerte{animation:sonar 0.5s ease-out;}
.led.pulso-media{animation:sonar-media 0.7s ease-out;}

/* HERRAMIENTAS */
#toolsWrapper{flex-shrink:0;border-top:1px solid var(--border);background:var(--black);display:flex;justify-content:center;}
#primitivosPanel{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:3px;padding:4px;width:100%;max-width:420px;}
.prim-btn{height:68px;width:100%;background:var(--dim);border:1px solid var(--border);color:#666;font-family:'Courier New',monospace;font-size:8px;font-weight:700;letter-spacing:0.04em;cursor:pointer;border-radius:var(--r-op);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 0.1s;}
.prim-btn img{width:32px;height:32px;opacity:0.4;display:block;}
.prim-btn.selected{border-color:#555;color:#fff;}
.prim-btn.selected img{opacity:1;}
.prim-btn:active{background:var(--border);}

/* BOTTOM BAR */
#bottomBar{flex-shrink:0;border-top:1px solid var(--border);display:flex;justify-content:center;}
#bottomBar .inner{display:flex;width:100%;max-width:420px;}
.b-btn{flex:1;background:var(--dim);border:none;border-right:1px solid var(--border);color:#555;padding:8px 4px;font-family:'Courier New',monospace;font-size:8px;letter-spacing:0.07em;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.15s;}
.b-btn:last-child{border-right:none;}
.b-btn:active{background:var(--border);color:var(--white);}
.b-btn.encendido{color:var(--red);border-top:2px solid var(--red);background:rgba(255,45,45,0.08);}
.b-btn.invitar{color:var(--green);border-top:2px solid var(--green);background:rgba(0,255,65,0.08);font-weight:700;}
#notif{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--black);padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:0.1em;border-radius:2px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:999;white-space:nowrap;}
#notif.show{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="logo">EP·ST // VER</div>
    <div id="modoActivo" onclick="abrirModos()">SIGNAL</div>
    <div id="frameCount">0 etiq</div>
    <button id="btnOjo" onclick="abrirModos()">👁</button>
    <button id="btnCanal" onclick="toggleCanal()">B/N</button>
  </div>

  <div id="modosPanel">
    <button class="modo-opt active" data-modo="SIGNAL" onclick="setModo(this)">
      <img src="https://ivantodojunto.github.io/CROP_MACHINE/DETECTING MODE.png" alt="">SIGNAL
    </button>
    <button class="modo-opt" data-modo="CARE" onclick="setModo(this)">
      <img src="https://ivantodojunto.github.io/CROP_MACHINE/INFLUENCE.png" alt="">CARE
    </button>
    <button class="modo-opt" data-modo="BUILD" onclick="setModo(this)">
      <img src="https://ivantodojunto.github.io/CROP_MACHINE/TOOLS MODE.png" alt="">BUILD
    </button>
    <button class="modo-opt" data-modo="ZEN" onclick="setModo(this)">
      <img src="https://ivantodojunto.github.io/CROP_MACHINE/ZEN MODE.png" alt="">ZEN
    </button>
    <div id="modosCerrar" onclick="cerrarModos()">— CERRAR —</div>
  </div>

  <div id="specPanel">
    <div id="specScreen">
      <canvas id="specCanvas"></canvas>
      <div id="specWheel"><canvas id="specWheelCanvas" width="38"></canvas></div>
      <div id="specHud">b=<span id="specB">2.0</span> &nbsp;φ=<span id="specPhi">0</span>°</div>
      <div id="specThumbHud"><span id="specThumbPhi">0</span>°<br><span id="specThumbB">1:2</span></div>
      <div id="specThumb"><canvas id="specThumbCanvas" width="88" height="66"></canvas></div>
    </div>
    <div id="specBottom">
      <div id="specDialWrap"><canvas id="specDialCanvas" width="110" height="110"></canvas></div>
      <div id="specRight">
        <div class="spec-toggle on" onclick="specToggle('log')"><div class="spec-dot on" id="specDotLog"></div>LOG(n)</div>
        <div class="spec-toggle" onclick="specToggle('angle')"><div class="spec-dot" id="specDotAngle"></div>ANGLE</div>
        <div class="spec-toggle" onclick="specToggle('zoom')"><div class="spec-dot" id="specDotZoom"></div>ZOOM</div>
        <div id="specClose" onclick="cerrarEspectrometro()">— CERRAR —</div>
      </div>
    </div>
  </div>

  <div id="cameraZone">
    <canvas id="viewCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <video id="video" autoplay playsinline muted></video>
    <div id="cameraOff"><div class="eye">👁</div><p>CAM APAGADA</p></div>
    <div id="colorChannel"><canvas id="colorCanvas" width="16" height="16"></canvas></div>
  </div>

  <div id="tagStrip"></div>

  <div id="toolsWrapper">
    <div id="primitivosPanel">
      <button class="prim-btn" data-prim="SPOT" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/POSSITION.png" alt="">SPOT</button>
      <button class="prim-btn" data-prim="AREA" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/FUZZY_AREA.png" alt="">ÁREA</button>
      <button class="prim-btn" data-prim="RUIDO" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/NOISE.png" alt="">RUIDO</button>
      <button class="prim-btn" data-prim="PATRON" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/PATTERN.png" alt="">PATRÓN</button>
      <button class="prim-btn" data-prim="ANGULO" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/ANGLE.png" alt="">ÁNGULO</button>
      <button class="prim-btn" data-prim="GRADIENTE" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/GRADIENT.png" alt="">GRAD</button>
      <button class="prim-btn" data-prim="VERTICE" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/VERTEX.png" alt="">VÉRTICE</button>
      <button class="prim-btn" data-prim="FIGURA" onclick="selectPrim(this)"><img src="https://ivantodojunto.github.io/CROP_MACHINE/FIGURE.png" alt="">FIGURA</button>
    </div>
  </div>

  <div id="bottomBar">
    <div class="inner">
      <button class="b-btn invitar" id="btnCam" onclick="toggleCamera()">
        <img id="iconCam" src="https://ivantodojunto.github.io/CROP_MACHINE/EYE_PLAY.png" style="width:22px;height:22px;filter:invert(1);opacity:0.5;display:block;margin:0 auto 2px;">CAM
      </button>
      <button class="b-btn" onclick="abrirEspectrometro()">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/EYE_IRIS.png" style="width:22px;height:22px;filter:invert(1);opacity:0.5;display:block;margin:0 auto 2px;">VER
      </button>
      <button class="b-btn" onclick="exportarEtiquetas()">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/JSON.png" style="width:22px;height:22px;filter:invert(1);opacity:0.5;display:block;margin:0 auto 2px;">JSON
      </button>
    </div>
  </div>

</div>
<div id="notif"></div>

<script>
const RES=64,CRES=16,UMBRAL_MEDIA=3,UMBRAL_FUERTE=10;

const state={
  stream:null,running:false,frozen:false,
  primActivo:null,modo:'SIGNAL',vistaIdx:0,
  etiquetasActivas:new Set(),zonas:[],
  grid:Array.from({length:RES},()=>Array.from({length:RES},()=>({}))),
  spots:[],totalEtiquetas:0,spotSeq:0,
};

const spec={
  base:2.0,phi:0,wheelOff:0,
  dragW:false,dragWY:0,wheelOffStart:0,
  dialDrag:false,dialA0:0,phi0:0,
  frameSnap:null,
};

const gesto={fase:0,p1:null,p2:null,downPos:null,moviendo:null,tapMoved:false};

const VISTAS=[
  {id:'BN',label:'B/N',color:'#888'},
  {id:'COLOR',label:'COLOR',color:'#ffb800'},
  {id:'U60',label:'U·60',color:'#aaa',umbral:60},
  {id:'U100',label:'U·100',color:'#aaa',umbral:100},
  {id:'U140',label:'U·140',color:'#aaa',umbral:140},
  {id:'U180',label:'U·180',color:'#aaa',umbral:180},
];

const N_PARTICULAS=120;
const particulas=Array.from({length:N_PARTICULAS},()=>({x:Math.random(),y:Math.random(),vx:0,vy:0}));

let viewCanvas,overlayCanvas,vCtx,oCtx;
let video,workCanvas,wCtx,colorCanvas,cCtx,colorWork,cwCtx;
let specCanvas,specCtx,specWheelCanvas,specWheelCtx,specDialCanvas,specDialCtx,specThumbCanvas,specThumbCtx;
let animFrame=null;

document.addEventListener('DOMContentLoaded',()=>{
  viewCanvas=document.getElementById('viewCanvas');
  overlayCanvas=document.getElementById('overlayCanvas');
  vCtx=viewCanvas.getContext('2d',{willReadFrequently:true});
  oCtx=overlayCanvas.getContext('2d');
  video=document.getElementById('video');
  colorCanvas=document.getElementById('colorCanvas');
  cCtx=colorCanvas.getContext('2d');
  workCanvas=document.createElement('canvas'); workCanvas.width=workCanvas.height=RES;
  wCtx=workCanvas.getContext('2d',{willReadFrequently:true});
  colorWork=document.createElement('canvas'); colorWork.width=colorWork.height=CRES;
  cwCtx=colorWork.getContext('2d',{willReadFrequently:true});

  specCanvas=document.getElementById('specCanvas');
  specCtx=specCanvas.getContext('2d');
  specWheelCanvas=document.getElementById('specWheelCanvas');
  specWheelCtx=specWheelCanvas.getContext('2d');
  specDialCanvas=document.getElementById('specDialCanvas');
  specDialCtx=specDialCanvas.getContext('2d');
  specThumbCanvas=document.getElementById('specThumbCanvas');
  specThumbCtx=specThumbCanvas.getContext('2d');

  posicionarTagStrip(); iniciarEtiquetasBase(); actualizarBtnCam();

  overlayCanvas.addEventListener('touchstart',onPointerDown,{passive:false});
  overlayCanvas.addEventListener('touchmove',onPointerMove,{passive:false});
  overlayCanvas.addEventListener('touchend',onPointerUp,{passive:false});
  overlayCanvas.addEventListener('mousedown',onPointerDown);
  overlayCanvas.addEventListener('mousemove',onPointerMove);
  overlayCanvas.addEventListener('mouseup',onPointerUp);

  const sw=document.getElementById('specWheel');
  sw.addEventListener('mousedown',e=>{spec.dragW=true;spec.dragWY=e.clientY;spec.wheelOffStart=spec.wheelOff;e.preventDefault();});
  sw.addEventListener('touchstart',e=>{e.preventDefault();spec.dragW=true;spec.dragWY=e.touches[0].clientY;spec.wheelOffStart=spec.wheelOff;},{passive:false});

  const sd=document.getElementById('specDialWrap');
  function dialAngle(cx,cy,rect){return Math.atan2(cy-rect.top-55,cx-rect.left-55)*180/Math.PI;}
  sd.addEventListener('mousedown',e=>{spec.dialDrag=true;const r=sd.getBoundingClientRect();spec.dialA0=dialAngle(e.clientX,e.clientY,r);spec.phi0=spec.phi;});
  sd.addEventListener('touchstart',e=>{e.preventDefault();spec.dialDrag=true;const r=sd.getBoundingClientRect();spec.dialA0=dialAngle(e.touches[0].clientX,e.touches[0].clientY,r);spec.phi0=spec.phi;},{passive:false});

  window.addEventListener('mousemove',e=>{
    if(spec.dragW){const dy=e.clientY-spec.dragWY;spec.wheelOff=spec.wheelOffStart+dy;const n=((spec.wheelOff%240)+240)%240/240;spec.base=1.05+n*8.95;renderSpec();}
    if(spec.dialDrag){const r=document.getElementById('specDialWrap').getBoundingClientRect();const a=dialAngle(e.clientX,e.clientY,r);spec.phi=(spec.phi0+(a-spec.dialA0)+360)%360;renderSpec();}
  });
  window.addEventListener('touchmove',e=>{
    if(spec.dragW){const dy=e.touches[0].clientY-spec.dragWY;spec.wheelOff=spec.wheelOffStart+dy;const n=((spec.wheelOff%240)+240)%240/240;spec.base=1.05+n*8.95;renderSpec();}
    if(spec.dialDrag){const r=document.getElementById('specDialWrap').getBoundingClientRect();const a=dialAngle(e.touches[0].clientX,e.touches[0].clientY,r);spec.phi=(spec.phi0+(a-spec.dialA0)+360)%360;renderSpec();}
  },{passive:false});
  window.addEventListener('mouseup',()=>{spec.dragW=false;spec.dialDrag=false;});
  window.addEventListener('touchend',()=>{spec.dragW=false;spec.dialDrag=false;});

  window.addEventListener('resize',()=>{resizeCanvases();posicionarTagStrip();resizeSpec();});
  window.addEventListener('beforeunload',()=>{if(state.stream) state.stream.getTracks().forEach(t=>t.stop());});
  document.addEventListener('visibilitychange',()=>{if(state.stream) state.stream.getTracks().forEach(t=>t.enabled=!document.hidden);});

  resizeCanvases(); resizeSpec(); renderLoop();
});

function posicionarTagStrip(){
  const zone=document.getElementById('cameraZone'),strip=document.getElementById('tagStrip');
  const rect=zone.getBoundingClientRect();
  strip.style.top=rect.top+'px'; strip.style.height=rect.height+'px';
}

function resizeCanvases(){
  if(!viewCanvas) return;
  const zone=document.getElementById('cameraZone');
  const size=Math.min(zone.clientWidth,zone.clientHeight)*0.96;
  [viewCanvas,overlayCanvas].forEach(c=>{
    c.style.width=c.style.height=size+'px'; c.width=c.height=size;
    c.style.position='absolute';
    c.style.left=((zone.clientWidth-size)/2)+'px';
    c.style.top=((zone.clientHeight-size)/2)+'px';
  });
}

function resizeSpec(){
  if(!specCanvas) return;
  const screen=document.getElementById('specScreen');
  const W=screen.clientWidth||360, H=screen.clientHeight||280;
  specCanvas.width=W; specCanvas.height=H;
  const wh=Math.floor(H*0.6);
  specWheelCanvas.width=38; specWheelCanvas.height=wh;
  document.getElementById('specWheel').style.height=wh+'px';
  document.getElementById('specWheel').style.top=Math.floor(H*0.2)+'px';
}

// MODOS
function abrirModos(){document.getElementById('modosPanel').classList.add('visible');}
function cerrarModos(){document.getElementById('modosPanel').classList.remove('visible');}
function setModo(btn){
  document.querySelectorAll('.modo-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); state.modo=btn.dataset.modo;
  document.getElementById('modoActivo').textContent=btn.dataset.modo;
  cerrarModos(); showNotif(btn.dataset.modo);
}

// ESPECTRÓMETRO
function abrirEspectrometro(){
  if(state.running){
    spec.frameSnap=wCtx.getImageData(0,0,RES,RES);
    specThumbCtx.imageSmoothingEnabled=false;
    specThumbCtx.drawImage(workCanvas,0,0,88,66);
  }
  resizeSpec();
  document.getElementById('specPanel').classList.add('visible');
  renderSpec();
}

function cerrarEspectrometro(){document.getElementById('specPanel').classList.remove('visible');}

function specToggle(key){
  const K=key.charAt(0).toUpperCase()+key.slice(1);
  const dot=document.getElementById('specDot'+K);
  const tog=document.querySelector(`[onclick="specToggle('${key}')"]`);
  const on=dot.classList.toggle('on');
  tog.classList.toggle('on',on);
}

function calcGradientes(){
  if(!spec.frameSnap) return [];
  const d=spec.frameSnap.data;
  const rad=spec.phi*Math.PI/180;
  const ux=Math.cos(rad),uy=Math.sin(rad);
  const res=[];
  function br(r,c){return d[(r*RES+c)*4];}
  for(let r=1;r<RES-1;r+=2) for(let c=1;c<RES-1;c+=2){
    const gx=br(r,c+1)-br(r,c-1), gy=br(r+1,c)-br(r-1,c);
    const mag=Math.sqrt(gx*gx+gy*gy);
    if(mag<8) continue;
    const proj=Math.abs((gx*ux+gy*uy)/mag);
    res.push({r,c,mag,proj,gx,gy});
  }
  return res;
}

function rayasLog(b,H){
  const pos=[];
  for(let i=0;i<=16;i++){
    if(b<=1.01) pos.push(i/16*H);
    else pos.push(Math.log(1+i*(b-1)/16)/Math.log(b)*H);
  }
  return pos;
}

function renderSpec(){
  if(!specCanvas) return;
  const W=specCanvas.width,H=specCanvas.height;
  specCtx.fillStyle='#0a0800'; specCtx.fillRect(0,0,W,H);

  const posLog=rayasLog(spec.base,H);
  for(let i=0;i<=16;i++){
    const y=posLog[i];
    const dens=i>0?(posLog[i]-posLog[i-1])/(H/16):1;
    const bright=Math.min(0.85,0.3/Math.max(0.04,dens));
    specCtx.strokeStyle=`rgba(255,140,0,${bright.toFixed(2)})`;
    specCtx.lineWidth=dens<0.5?2:1;
    specCtx.beginPath(); specCtx.moveTo(32,y); specCtx.lineTo(W,y); specCtx.stroke();
  }
  specCtx.strokeStyle='rgba(255,140,0,0.07)'; specCtx.lineWidth=0.5;
  for(let i=0;i<=16;i++){
    const y=i/16*H;
    specCtx.beginPath(); specCtx.moveTo(32,y); specCtx.lineTo(W,y); specCtx.stroke();
  }

  const grads=calcGradientes();
  if(grads.length>0){
    const csW=W/RES,csH=H/RES;
    grads.forEach(({r,c,mag,proj,gx,gy})=>{
      const px=(c+0.5)*csW,py=(r+0.5)*csH;
      const len=Math.min(csW*1.2,mag/255*csW*4);
      const nm=Math.sqrt(gx*gx+gy*gy);
      const nx=gx/nm,ny=gy/nm;
      const alpha=0.4+proj*0.5;
      specCtx.strokeStyle=`rgba(${Math.floor((1-proj)*80)},${Math.floor(proj*255)},65,${alpha.toFixed(2)})`;
      specCtx.lineWidth=1.5;
      specCtx.beginPath();
      specCtx.moveTo(px-nx*len/2,py-ny*len/2);
      specCtx.lineTo(px+nx*len/2,py+ny*len/2);
      specCtx.stroke();
    });
  } else if(!spec.frameSnap){
    specCtx.fillStyle='rgba(255,140,0,0.25)';
    specCtx.font='11px Courier New';
    specCtx.fillText('activa CAM y pulsa VER para analizar',36,H/2);
  }

  document.getElementById('specB').textContent=spec.base.toFixed(1);
  document.getElementById('specPhi').textContent=Math.round(spec.phi);
  document.getElementById('specThumbPhi').textContent=Math.round(spec.phi);
  document.getElementById('specThumbB').textContent='1:'+Math.round(spec.base*8);

  renderSpecWheel(); renderSpecDial();
}

function renderSpecWheel(){
  const W=38,H=specWheelCanvas.height||160;
  specWheelCtx.clearRect(0,0,W,H);
  const sp=20,off=((spec.wheelOff%sp)+sp)%sp;
  for(let y=off-sp;y<H+sp;y+=sp){
    specWheelCtx.strokeStyle='rgba(0,0,0,0.65)'; specWheelCtx.lineWidth=3;
    specWheelCtx.beginPath(); specWheelCtx.moveTo(4,y); specWheelCtx.lineTo(W-4,y); specWheelCtx.stroke();
    specWheelCtx.strokeStyle='rgba(255,120,120,0.2)'; specWheelCtx.lineWidth=1;
    specWheelCtx.beginPath(); specWheelCtx.moveTo(4,y+1); specWheelCtx.lineTo(W-4,y+1); specWheelCtx.stroke();
  }
  specWheelCtx.strokeStyle='rgba(255,140,0,0.9)'; specWheelCtx.lineWidth=2;
  specWheelCtx.beginPath(); specWheelCtx.moveTo(0,H/2); specWheelCtx.lineTo(W,H/2); specWheelCtx.stroke();
}

function renderSpecDial(){
  const W=110,H=110,cx=55,cy=55,R=48;
  specDialCtx.clearRect(0,0,W,H);
  specDialCtx.fillStyle='#0d0d0d';
  specDialCtx.beginPath(); specDialCtx.arc(cx,cy,R+6,0,Math.PI*2); specDialCtx.fill();
  for(let i=0;i<60;i++){
    const a=i/60*Math.PI*2,len=i%5===0?8:3;
    specDialCtx.strokeStyle=i%5===0?'#444':'#2a2a2a'; specDialCtx.lineWidth=i%5===0?1.2:0.7;
    specDialCtx.beginPath();
    specDialCtx.moveTo(cx+(R+1)*Math.cos(a),cy+(R+1)*Math.sin(a));
    specDialCtx.lineTo(cx+(R+1+len)*Math.cos(a),cy+(R+1+len)*Math.sin(a));
    specDialCtx.stroke();
  }
  specDialCtx.fillStyle='#080808';
  specDialCtx.beginPath(); specDialCtx.arc(cx,cy,R,0,Math.PI*2); specDialCtx.fill();
  [R*0.25,R*0.5,R*0.75,R*0.95].forEach((r,i)=>{
    specDialCtx.strokeStyle=`rgba(0,200,50,${0.08+i*0.05})`; specDialCtx.lineWidth=0.8;
    specDialCtx.beginPath(); specDialCtx.arc(cx,cy,r,0,Math.PI*2); specDialCtx.stroke();
  });
  // eje vertical referencia
  specDialCtx.strokeStyle='rgba(255,255,255,0.15)'; specDialCtx.lineWidth=0.5; specDialCtx.setLineDash([2,4]);
  specDialCtx.beginPath(); specDialCtx.moveTo(cx,cy-R); specDialCtx.lineTo(cx,cy+R); specDialCtx.stroke();
  specDialCtx.setLineDash([]);
  // etiquetas al lado de los anillos
  specDialCtx.fillStyle='rgba(255,255,255,0.2)'; specDialCtx.font='7px Courier New';
  [[R*0.25,'256'],[R*0.5,'64'],[R*0.75,'16'],[R*0.95,'4']].forEach(([r,v])=>{
    specDialCtx.fillText(v,cx+r+2,cy+3);
  });
  // aguja — 0° apunta arriba
  const rad=(spec.phi-90)*Math.PI/180,agLen=R*0.72;
  specDialCtx.save(); specDialCtx.translate(cx,cy);
  specDialCtx.strokeStyle='rgba(0,0,0,0.5)'; specDialCtx.lineWidth=6; specDialCtx.lineCap='round';
  specDialCtx.beginPath(); specDialCtx.moveTo(0,0); specDialCtx.lineTo(agLen*Math.cos(rad),agLen*Math.sin(rad)); specDialCtx.stroke();
  specDialCtx.strokeStyle='#e8a020'; specDialCtx.lineWidth=4;
  specDialCtx.beginPath(); specDialCtx.moveTo(0,0); specDialCtx.lineTo(agLen*Math.cos(rad),agLen*Math.sin(rad)); specDialCtx.stroke();
  specDialCtx.fillStyle='#e8a020'; specDialCtx.beginPath(); specDialCtx.arc(0,0,5,0,Math.PI*2); specDialCtx.fill();
  specDialCtx.fillStyle='#ffee00'; specDialCtx.beginPath(); specDialCtx.arc(0,0,2.5,0,Math.PI*2); specDialCtx.fill();
  specDialCtx.restore();
  // puntero fijo arriba
  specDialCtx.fillStyle='#fff';
  specDialCtx.beginPath(); specDialCtx.moveTo(cx,cy-R-1); specDialCtx.lineTo(cx-3,cy-R-9); specDialCtx.lineTo(cx+3,cy-R-9); specDialCtx.closePath(); specDialCtx.fill();
}

// CÁMARA
async function toggleCamera(){if(state.running) stopCamera(); else await startCamera();}

async function startCamera(){
  try{
    state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:320},height:{ideal:320}},audio:false});
    video.srcObject=state.stream; await video.play();
    state.running=true; state.frozen=false;
    document.getElementById('cameraOff').style.display='none';
    document.getElementById('colorChannel').style.display='block';
    actualizarBtnCam();
  }catch(e){showNotif('Sin permiso de cámara');}
}

function stopCamera(){
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  state.running=false;
  document.getElementById('cameraOff').style.display='flex';
  document.getElementById('colorChannel').style.display='none';
  actualizarBtnCam();
}

function actualizarBtnCam(){
  const btn=document.getElementById('btnCam'),icon=document.getElementById('iconCam');
  if(state.running){btn.classList.add('encendido');btn.classList.remove('invitar');if(icon) icon.src='https://ivantodojunto.github.io/CROP_MACHINE/EYE_PAUSE.png';}
  else{btn.classList.remove('encendido');btn.classList.add('invitar');if(icon) icon.src='https://ivantodojunto.github.io/CROP_MACHINE/EYE_PLAY.png';}
}

function toggleCanal(){
  state.vistaIdx=(state.vistaIdx+1)%VISTAS.length;
  const v=VISTAS[state.vistaIdx];
  const btn=document.getElementById('btnCanal');
  btn.textContent=v.label; btn.style.color=v.color; btn.style.borderColor=v.color;
}

function freezeFrame(){
  if(!state.running) return;
  state.frozen=!state.frozen;
  state.stream.getTracks().forEach(t=>t.enabled=!state.frozen);
  showNotif(state.frozen?'CONGELADO':'EN VIVO');
}

// RENDER LOOP
function renderLoop(){
  const sz=viewCanvas.width;
  if(state.running&&!state.frozen&&video.readyState>=2){
    wCtx.drawImage(video,0,0,RES,RES);
    const id=wCtx.getImageData(0,0,RES,RES),d=id.data;
    for(let i=0;i<d.length;i+=4){const g=Math.round(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]);d[i]=d[i+1]=d[i+2]=g;}
    wCtx.putImageData(id,0,0);
    cwCtx.drawImage(video,0,0,CRES,CRES);
    const cd_=cwCtx.getImageData(0,0,CRES,CRES),cd=cd_.data;
    for(let i=0;i<cd.length;i+=4){
      const br=0.299*cd[i]+0.587*cd[i+1]+0.114*cd[i+2],s=2.2,m=128;
      cd[i]=Math.min(255,Math.max(0,m+(cd[i]-br)*s+(br-m)*0.25));
      cd[i+1]=Math.min(255,Math.max(0,m+(cd[i+1]-br)*s+(br-m)*0.25));
      cd[i+2]=Math.min(255,Math.max(0,m+(cd[i+2]-br)*s+(br-m)*0.25));
    }
    cwCtx.putImageData(cd_,0,0);
    cCtx.imageSmoothingEnabled=false; cCtx.drawImage(colorWork,0,0,16,16);
  }
  vCtx.fillStyle='#000'; vCtx.fillRect(0,0,sz,sz);
  if(state.running){
    const vista=VISTAS[state.vistaIdx];
    vCtx.imageSmoothingEnabled=false; vCtx.globalAlpha=0.35;
    if(vista.id==='BN') vCtx.drawImage(workCanvas,0,0,sz,sz);
    else if(vista.id==='COLOR') vCtx.drawImage(colorWork,0,0,sz,sz);
    else if(vista.umbral){
      const imgU=wCtx.getImageData(0,0,RES,RES),du=new Uint8ClampedArray(imgU.data);
      for(let i=0;i<du.length;i+=4){const v=du[i]>vista.umbral?255:0;du[i]=du[i+1]=du[i+2]=v;du[i+3]=255;}
      const tmp=document.createElement('canvas');tmp.width=tmp.height=RES;
      tmp.getContext('2d').putImageData(new ImageData(du,RES,RES),0,0);
      vCtx.drawImage(tmp,0,0,sz,sz);
    }
    vCtx.globalAlpha=1;
  }
  renderAcumulacion();
  if(state.etiquetasActivas.size>0) renderParticulas();
  else renderDeteccion();
  renderOverlay();
  animFrame=requestAnimationFrame(renderLoop);
}

function getCampoEtiqueta(ex,ey,id){
  if(!workCanvas) return 0;
  const c=Math.floor(ex*RES),r=Math.floor(ey*RES);
  if(c<0||c>=RES||r<0||r>=RES) return 0;
  const brillo=wCtx.getImageData(c,r,1,1).data[0]/255;
  if(id==='LUZ') return brillo;
  if(id==='SOMBRA') return 1-brillo;
  if(id==='ROJO'||id==='VERDE'||id==='AZUL'){
    const sc=Math.floor(ex*CRES),sr=Math.floor(ey*CRES),cd=cwCtx.getImageData(sc,sr,1,1).data;
    if(id==='ROJO') return cd[0]/255;
    if(id==='VERDE') return cd[1]/255;
    if(id==='AZUL') return cd[2]/255;
  }
  const c2=Math.min(RES-1,c+1),r2=Math.min(RES-1,r+1),d=wCtx.getImageData(0,0,RES,RES).data;
  const dx=(d[(r*RES+c2)*4]-d[(r*RES+Math.max(0,c-1))*4])/255;
  const dy=(d[(r2*RES+c)*4]-d[(Math.max(0,r-1)*RES+c)*4])/255;
  return Math.sqrt(dx*dx+dy*dy);
}

function renderParticulas(){
  if(!viewCanvas||!state.running) return;
  const s=viewCanvas.width;
  particulas.forEach(p=>{
    let fx=0,fy=0;
    [...state.etiquetasActivas].forEach(id=>{
      const eps=0.02,v0=getCampoEtiqueta(p.x,p.y,id);
      const vx=getCampoEtiqueta(Math.min(1,p.x+eps),p.y,id);
      const vy=getCampoEtiqueta(p.x,Math.min(1,p.y+eps),id);
      fx+=(vx-v0)/eps*0.0008; fy+=(vy-v0)/eps*0.0008;
    });
    fx+=(Math.random()-0.5)*0.002; fy+=(Math.random()-0.5)*0.002;
    p.vx=p.vx*0.92+fx; p.vy=p.vy*0.92+fy;
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(spd>0.008){p.vx=p.vx/spd*0.008;p.vy=p.vy/spd*0.008;}
    p.x=Math.max(0,Math.min(1,p.x+p.vx)); p.y=Math.max(0,Math.min(1,p.y+p.vy));
    if(p.x<=0||p.x>=1||p.y<=0||p.y>=1){p.x=Math.random();p.y=Math.random();p.vx=0;p.vy=0;}
  });
  vCtx.save();
  particulas.forEach(p=>{
    const px=p.x*s,py=p.y*s,spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    const alpha=Math.min(0.9,spd/0.008*0.7+0.2),radio=Math.min(4,spd/0.008*3+1);
    vCtx.beginPath(); vCtx.arc(px,py,radio,0,Math.PI*2);
    vCtx.fillStyle=`rgba(0,255,65,${alpha.toFixed(2)})`; vCtx.fill();
  });
  vCtx.restore();
}

function renderDeteccion(){
  if(!viewCanvas||!state.primActivo||!state.running) return;
  const s=viewCanvas.width,cs=s/RES;
  const imgData=wCtx.getImageData(0,0,RES,RES),d=imgData.data;
  function brillo(r,c){return d[((r*RES)+c)*4];}
  vCtx.save(); vCtx.strokeStyle='rgba(0,255,65,0.9)'; vCtx.lineWidth=1.5;
  for(let r=1;r<RES-1;r+=2) for(let c=1;c<RES-1;c+=2){
    const dx=brillo(r,c+1)-brillo(r,c-1),dy=brillo(r+1,c)-brillo(r-1,c);
    const mag=Math.sqrt(dx*dx+dy*dy);
    if(mag<8) continue;
    const b=brillo(r,c);
    let mostrar=false;
    if(state.primActivo==='LUZ') mostrar=b>150;
    else if(state.primActivo==='SOMBRA') mostrar=b<100;
    else mostrar=true;
    if(!mostrar) continue;
    const cx=c*cs+cs/2,cy=r*cs+cs/2;
    const len=Math.min(cs*1.4,mag/255*cs*5);
    const nx=dx/mag,ny=dy/mag;
    vCtx.beginPath(); vCtx.moveTo(cx-nx*len/2,cy-ny*len/2); vCtx.lineTo(cx+nx*len/2,cy+ny*len/2); vCtx.stroke();
  }
  vCtx.restore();
}

function renderAcumulacion(){
  const s=viewCanvas.width,cs=s/RES;
  const maxA=Math.max(1,state.totalEtiquetas/(RES*RES)*20);
  vCtx.save();
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++){
    const t=Object.values(state.grid[r][c]).reduce((a,v)=>a+v,0);
    if(t<1) continue;
    vCtx.fillStyle=`rgba(60,120,255,${Math.min(0.28,t/maxA*0.28)})`; vCtx.fillRect(c*cs,r*cs,cs,cs);
  }
  vCtx.restore();
}

function atraparZona(cx,cy){
  const s=overlayCanvas.width,nx=cx/s,ny=cy/s,radio=0.12;
  const cap=particulas.filter(p=>{const dx=p.x-nx,dy=p.y-ny;return Math.sqrt(dx*dx+dy*dy)<radio;});
  if(cap.length<3){showNotif('zona vacía');return;}
  const zona={x:nx,y:ny,radio,particulas:cap.length,etiquetas:[...state.etiquetasActivas],id:state.zonas.length+1};
  state.zonas.push(zona);
  if(state.zonas.length>=2) mostrarRelacion(state.zonas[state.zonas.length-2],zona);
  else showNotif('Z'+zona.id+' · '+cap.length+' · toca otra');
}

function mostrarRelacion(z1,z2){
  const dx=z2.x-z1.x,dy=z2.y-z1.y,dist=Math.sqrt(dx*dx+dy*dy);
  const comunes=[...new Set(z1.etiquetas)].filter(e=>z2.etiquetas.includes(e));
  let rel=dist<0.25?'CERCA':dist<0.5?'MEDIA':'LEJOS';
  let msg=`Z${z1.id}↔Z${z2.id} · ${rel}`;
  if(comunes.length) msg+=' · '+comunes.join('+');
  showNotif(msg,4000);
}

function renderOverlay(){
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  state.spots.forEach(sp=>{
    oCtx.beginPath(); oCtx.arc(sp.x,sp.y,5,0,Math.PI*2); oCtx.fillStyle='rgba(60,120,255,0.9)'; oCtx.fill();
    oCtx.beginPath(); oCtx.arc(sp.x,sp.y,9,0,Math.PI*2); oCtx.strokeStyle='rgba(60,120,255,0.25)'; oCtx.lineWidth=1.5; oCtx.stroke();
  });
  state.zonas.forEach(z=>{
    const s=overlayCanvas.width,px=z.x*s,py=z.y*s,r=z.radio*s;
    oCtx.beginPath(); oCtx.arc(px,py,r,0,Math.PI*2);
    oCtx.strokeStyle='rgba(255,255,255,0.5)'; oCtx.lineWidth=1; oCtx.setLineDash([3,3]); oCtx.stroke(); oCtx.setLineDash([]);
    oCtx.font='bold 10px monospace';
    z.etiquetas.forEach((e,i)=>{
      const tx=Math.min(px+r+6+i*14,overlayCanvas.width-55),ty=py+i*8;
      oCtx.fillStyle='rgba(0,0,0,0.8)'; oCtx.fillText(e.substring(0,6),tx+1,ty+1);
      oCtx.fillStyle='rgba(255,255,255,1)'; oCtx.fillText(e.substring(0,6),tx,ty);
    });
    oCtx.fillStyle='rgba(255,184,0,0.8)'; oCtx.fillText('Z'+z.id,px-8,py+4);
    if(z.id>1){
      const zp=state.zonas[z.id-2];
      oCtx.beginPath(); oCtx.moveTo(zp.x*s,zp.y*s); oCtx.lineTo(px,py);
      oCtx.strokeStyle='rgba(255,184,0,0.3)'; oCtx.lineWidth=1; oCtx.setLineDash([2,4]); oCtx.stroke(); oCtx.setLineDash([]);
    }
  });
  const p1=gesto.p1,p2=gesto.p2||gesto.moviendo;
  if(!p1) return;
  oCtx.beginPath(); oCtx.arc(p1.x,p1.y,6,0,Math.PI*2); oCtx.fillStyle='rgba(255,184,0,0.9)'; oCtx.fill();
  if(p2){
    oCtx.beginPath(); oCtx.moveTo(p1.x,p1.y); oCtx.lineTo(p2.x,p2.y);
    oCtx.strokeStyle='rgba(60,120,255,0.6)'; oCtx.lineWidth=1.5; oCtx.setLineDash([5,3]); oCtx.stroke(); oCtx.setLineDash([]);
    oCtx.beginPath(); oCtx.arc(p2.x,p2.y,5,0,Math.PI*2); oCtx.fillStyle='rgba(60,120,255,0.7)'; oCtx.fill();
  }
}

function getCanvasPos(e){
  const rect=overlayCanvas.getBoundingClientRect();
  const t=(e.touches&&e.touches.length)?e.touches[0]:(e.changedTouches&&e.changedTouches.length)?e.changedTouches[0]:e;
  return {x:t.clientX-rect.left,y:t.clientY-rect.top};
}
function onPointerDown(e){
  e.preventDefault(); gesto.tapMoved=false;
  const p=getCanvasPos(e); gesto.downPos=p; gesto.moviendo=p;
  if(state.primActivo==='SPOT'){gesto.p1=p;return;}
  if(!state.primActivo) return;
  if(gesto.fase===0){gesto.p1=p;gesto.fase=1;}
}
function onPointerMove(e){
  e.preventDefault(); const p=getCanvasPos(e); gesto.moviendo=p;
  const ref=gesto.p1||gesto.downPos; if(!ref) return;
  if(Math.sqrt((p.x-ref.x)**2+(p.y-ref.y)**2)>8) gesto.tapMoved=true;
}
function onPointerUp(e){
  e.preventDefault(); const p=getCanvasPos(e);
  if(state.primActivo==='SPOT'){
    if(!gesto.tapMoved) marcarSpot(p.x,p.y);
    gesto.p1=null; gesto.downPos=null; gesto.moviendo=null; gesto.tapMoved=false; return;
  }
  if(!state.primActivo){
    if(!gesto.tapMoved){
      if(state.etiquetasActivas.size>0) atraparZona(p.x,p.y);
      else freezeFrame();
    }
    gesto.downPos=null; gesto.moviendo=null; gesto.tapMoved=false; return;
  }
  if(gesto.fase===1){
    gesto.p2=p; gesto.fase=0;
    etiquetarElipse({x1:gesto.p1.x,y1:gesto.p1.y,x2:gesto.p2.x,y2:gesto.p2.y},state.primActivo);
    gesto.p1=gesto.p2=gesto.downPos=gesto.moviendo=null; gesto.tapMoved=false;
  }
}

function marcarSpot(x,y){
  const s=viewCanvas.width;
  const col=Math.max(0,Math.min(RES-1,Math.floor(x/s*RES)));
  const row=Math.max(0,Math.min(RES-1,Math.floor(y/s*RES)));
  state.spots.push({id:++state.spotSeq,col,row,x,y});
  state.grid[row][col]['SPOT']=(state.grid[row][col]['SPOT']||0)+1;
  state.totalEtiquetas++;
  actualizarTagStrip('SPOT'); updateFrameCount();
}

function etiquetarElipse(e,prim){
  const s=viewCanvas.width,cs=s/RES;
  const cx=(e.x1+e.x2)/2,cy=(e.y1+e.y2)/2;
  const rx=Math.max(cs/2,Math.abs(e.x2-e.x1)/2),ry=Math.max(cs/2,Math.abs(e.y2-e.y1)/2);
  let count=0;
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++){
    const px=c*cs+cs/2,py=r*cs+cs/2;
    const dx=(px-cx)/rx,dy=(py-cy)/ry;
    if(dx*dx+dy*dy<=1){state.grid[r][c][prim]=(state.grid[r][c][prim]||0)+1;count++;state.totalEtiquetas++;}
  }
  if(count>0){actualizarTagStrip(prim);updateFrameCount();showNotif(prim+' · '+count);}
}

function selectPrim(btn){
  document.querySelectorAll('.prim-btn').forEach(b=>b.classList.remove('selected'));
  const prim=btn.dataset.prim;
  state.primActivo=(state.primActivo===prim)?null:prim;
  if(state.primActivo) btn.classList.add('selected');
}

const ETIQUETAS_BASE=['LUZ','SOMBRA','ROJO','VERDE','AZUL','AMARILLO','MARRÓN','CARNE'];
const tagCounts={};

function iniciarEtiquetasBase(){ETIQUETAS_BASE.forEach(id=>{tagCounts[id]=0;crearEtiquetaEl(id);});}

function crearEtiquetaEl(id){
  if(document.querySelector(`.etiqueta[data-prim="${id}"]`)) return;
  const row=document.createElement('div'); row.className='etiq-row';
  const el=document.createElement('div'); el.className='etiqueta'; el.dataset.prim=id;
  el.appendChild(document.createTextNode(id.substring(0,7)));
  const led=document.createElement('span'); led.className='led'; led.dataset.ledPrim=id;
  el.appendChild(led); row.appendChild(el);
  el.addEventListener('click',()=>{
    el.classList.toggle('activa');
    if(el.classList.contains('activa')) state.etiquetasActivas.add(id);
    else state.etiquetasActivas.delete(id);
    actualizarAtenuacion();
    if(state.etiquetasActivas.size>0){document.querySelectorAll('.prim-btn').forEach(b=>b.classList.remove('selected'));state.primActivo=null;}
  });
  document.getElementById('tagStrip').appendChild(row);
}

function actualizarAtenuacion(){
  const activas=state.etiquetasActivas;
  document.querySelectorAll('.etiqueta').forEach(el=>{
    if(activas.size===0){el.classList.remove('atenuada');return;}
    if(activas.has(el.dataset.prim)) el.classList.remove('atenuada');
    else el.classList.add('atenuada');
  });
}

function dispararPulso(led,nivel){
  led.classList.remove('pulso-fuerte','pulso-media');
  void led.offsetWidth;
  led.classList.add(nivel==='fuerte'?'pulso-fuerte':'pulso-media');
}

function actualizarTagStrip(prim){
  tagCounts[prim]=(tagCounts[prim]||0)+1;
  if(!document.querySelector(`.etiqueta[data-prim="${prim}"]`)) crearEtiquetaEl(prim);
  const led=document.querySelector(`.led[data-led-prim="${prim}"]`);
  if(!led) return;
  const ev=tagCounts[prim]; led.className='led';
  if(ev>=UMBRAL_FUERTE){led.classList.add('fuerte');dispararPulso(led,'fuerte');}
  else if(ev>=UMBRAL_MEDIA){led.classList.add('media');dispararPulso(led,'media');}
  else if(ev>=1) led.classList.add('debil');
}

function exportarEtiquetas(){
  if(state.totalEtiquetas===0){showNotif('Nada que exportar');return;}
  const celdas=[];
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++) if(Object.keys(state.grid[r][c]).length) celdas.push({r,c,e:state.grid[r][c]});
  const data={prims:tagCounts,celdas,spots:state.spots.map(s=>({id:s.id,col:s.col,row:s.row})),ts:new Date().toISOString()};
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download='ver_'+Date.now()+'.json'; a.click();
  showNotif('JSON exportado');
}

function updateFrameCount(){document.getElementById('frameCount').textContent=state.totalEtiquetas+' etiq';}
function showNotif(msg,dur=1800){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),dur);}
</script>
