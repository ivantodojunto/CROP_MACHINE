<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VER // EP by St</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#000; --near:#0a0a0a; --dim:#111; --border:#222;
  --mid:#555; --light:#999; --white:#fff;
  --green:#00ff41; --amber:#ffb800; --red:#ff2d2d;
  --r-op:3px; --r-etiq:20px; --r-modo:50%;
}
html,body { height:100dvh; background:var(--black); color:var(--white); font-family:'Courier New',monospace; overflow:hidden; touch-action:none; }
#app { display:flex; flex-direction:column; height:100dvh; }

/* HEADER */
#header { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
#logo { font-size:9px; font-weight:700; letter-spacing:0.2em; border:1px solid var(--border); padding:4px 7px; }
#modosBar { display:flex; gap:6px; align-items:center; }
.modo-btn { width:32px; height:32px; border-radius:var(--r-modo); background:var(--dim); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; transition:all 0.15s; }
.modo-btn img { width:18px; height:18px; filter:invert(0.4); display:block; }
.modo-btn.active { border-color:var(--green); background:rgba(0,255,65,0.1); }
.modo-btn.active img { filter:invert(0.9); }
#frameCount { font-size:9px; color:var(--mid); letter-spacing:0.1em; }

/* ZONA CÁMARA */
#cameraZone { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:var(--near); overflow:hidden; }
#viewCanvas { image-rendering:pixelated; display:block; pointer-events:none; }
#overlayCanvas { position:absolute; top:0; left:0; cursor:crosshair; }
#video { display:none; }
#cameraOff { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; color:var(--mid); cursor:pointer; }
#cameraOff .eye { font-size:52px; opacity:0.2; }
#cameraOff p { font-size:10px; letter-spacing:0.18em; }

/* COLOR CHANNEL */
#colorChannel { position:absolute; bottom:8px; right:8px; display:none; }
#colorCanvas { width:56px; height:56px; image-rendering:pixelated; border:1px solid rgba(255,255,255,0.12); display:block; }
#colorLabel { font-size:6px; color:var(--mid); text-align:center; margin-top:2px; letter-spacing:0.08em; }

/* ETIQUETAS — columna izquierda */
#tagStrip {
  position:absolute; left:0; top:0; bottom:0; width:90px;
  overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column;
  gap:3px; padding:6px 5px; scrollbar-width:none; z-index:10;
  background:linear-gradient(to right,rgba(0,0,0,0.82) 72%,transparent);
}
#tagStrip::-webkit-scrollbar { display:none; }
#tagStrip.operando { opacity:0; pointer-events:none; }

.etiqueta {
  flex-shrink:0; padding:5px 8px 5px 6px;
  border:1px solid #2a2a2a;
  font-size:8px; font-weight:700; letter-spacing:0.07em;
  cursor:pointer; transition:all 0.2s;
  background:rgba(0,0,0,0.5); color:#3a3a3a; /* inactiva: gris oscuro */
  display:flex; align-items:center; gap:5px;
  border-radius:var(--r-etiq);
}
.etiqueta .led {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  background:#1a1a1a; border:1px solid #333;
  transition:all 0.4s;
}
.etiqueta .cnt { margin-left:auto; font-size:6px; color:#333; font-weight:400; }

/* Estado: activa (usuario la encendió) */
.etiqueta.activa {
  background:rgba(180,180,180,0.08);
  color:#aaa; /* gris claro */
  border-color:#444;
}
.etiqueta.activa .cnt { color:#666; }

/* Salud de señal — LED independiente */
.etiqueta .led.debil  { background:#333; border-color:#555; }
.etiqueta .led.media  { background:#888; border-color:#aaa; box-shadow:0 0 3px #888; }
.etiqueta .led.fuerte { background:var(--amber); border-color:var(--amber); box-shadow:0 0 5px var(--amber); }

/* HERRAMIENTAS */
#toolsWrapper { flex-shrink:0; border-top:1px solid var(--border); display:flex; justify-content:center; background:var(--black); }
#primitivosPanel {
  display:grid; grid-template-rows:repeat(2,52px); grid-auto-flow:column; grid-auto-columns:52px;
  overflow-x:auto; overflow-y:hidden; scrollbar-width:none; gap:3px; padding:4px;
}
#primitivosPanel::-webkit-scrollbar { display:none; }
.prim-btn {
  width:52px; height:52px;
  background:var(--dim); border:1px solid var(--border); color:#555;
  font-family:'Courier New',monospace; font-size:7px; font-weight:700; letter-spacing:0.04em;
  cursor:pointer; text-align:center; transition:all 0.1s;
  border-radius:var(--r-op); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
}
.prim-btn img { width:22px; height:22px; filter:invert(0.4); display:block; }
.prim-btn.selected { background:rgba(255,255,255,0.9); color:#000; border-color:#fff; }
.prim-btn.selected img { filter:invert(0); }
.prim-btn:active { background:var(--border); }

/* BOTTOM BAR */
#bottomBar { flex-shrink:0; border-top:1px solid var(--border); display:flex; justify-content:center; }
#bottomBar .inner { display:flex; width:100%; max-width:420px; }
.b-btn { flex:1; background:var(--dim); border:none; border-right:1px solid var(--border); color:#444; padding:10px 4px; font-family:'Courier New',monospace; font-size:8px; letter-spacing:0.07em; cursor:pointer; text-align:center; transition:all 0.15s; }
.b-btn:last-child { border-right:none; }
.b-btn:active { background:var(--border); color:var(--white); }
.b-btn.encendido { color:var(--red); border-top:2px solid var(--red); background:rgba(255,45,45,0.08); }

/* NOTIF */
#notif { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--green); color:var(--black); padding:6px 14px; font-size:10px; font-weight:700; letter-spacing:0.1em; border-radius:2px; pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:999; white-space:nowrap; }
#notif.show { opacity:1; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="logo">EP·ST // VER</div>
    <div id="modosBar">
      <button class="modo-btn active" data-modo="DEPURAR" onclick="setModo(this)" title="Depurar">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/DETECTING MODE.png" alt="D">
      </button>
      <button class="modo-btn" data-modo="CAZAR" onclick="setModo(this)" title="Cazar">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/GENERATE MODE.png" alt="C">
      </button>
    </div>
    <div id="frameCount">0 etiq</div>
  </div>

  <div id="cameraZone">
    <div id="cameraOff">
      <div class="eye">👁</div>
      <p>TOCA PARA EMPEZAR</p>
    </div>
    <canvas id="viewCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <video id="video" autoplay playsinline muted></video>
    <div id="colorChannel">
      <canvas id="colorCanvas" width="16" height="16"></canvas>
      <div id="colorLabel">COLOR 16²</div>
    </div>
    <div id="tagStrip"></div>
  </div>

  <div id="toolsWrapper">
    <div id="primitivosPanel">
      <button class="prim-btn" data-prim="SPOT" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/POSSITION.png" alt="·">SPOT
      </button>
      <button class="prim-btn" data-prim="AREA" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/FUZZY_AREA.png" alt="◯">ÁREA
      </button>
      <button class="prim-btn" data-prim="RUIDO" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/NOISE.png" alt="≋">RUIDO
      </button>
      <button class="prim-btn" data-prim="PATRON" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/PATTERN.png" alt="⊞">PATRÓN
      </button>
      <button class="prim-btn" data-prim="ANGULO" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/ANGLE.png" alt="∠">ÁNGULO
      </button>
      <button class="prim-btn" data-prim="GRADIENTE" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/GRADIENT.png" alt="▒">GRAD
      </button>
      <button class="prim-btn" data-prim="VERTICE" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/VERTEX.png" alt="◆">VÉRTICE
      </button>
      <button class="prim-btn" data-prim="FIGURA" onclick="selectPrim(this)">
        <img src="https://ivantodojunto.github.io/CROP_MACHINE/FIGURE.png" alt="▣">FIGURA
      </button>
    </div>
  </div>

  <div id="bottomBar">
    <div class="inner">
      <button class="b-btn" id="btnCam" onclick="toggleCamera()">📷 CAM</button>
      <button class="b-btn" onclick="verReconstruccion()">🔮 VER</button>
      <button class="b-btn" onclick="exportarEtiquetas()">↓ JSON</button>
    </div>
  </div>

</div>
<div id="notif"></div>

<script>
const RES=64, CRES=16;
const ASSETS='https://ivantodojunto.github.io/CROP_MACHINE/';
const UMBRAL_MEDIA=3, UMBRAL_FUERTE=10;

const state = {
  stream:null, running:false, frozen:false,
  primActivo:null, modo:'DEPURAR',
  grid: Array.from({length:RES},()=>Array.from({length:RES},()=>({}))),
  spots:[], totalEtiquetas:0, spotSeq:0,
  evidencia:{},
};

const gesto = { fase:0, p1:null, p2:null, downPos:null, moviendo:null, tapMoved:false, _timer:null };

let viewCanvas, overlayCanvas, vCtx, oCtx;
let video, workCanvas, wCtx, colorCanvas, cCtx, colorWork, cwCtx;
let animFrame=null;

document.addEventListener('DOMContentLoaded', () => {
  viewCanvas    = document.getElementById('viewCanvas');
  overlayCanvas = document.getElementById('overlayCanvas');
  vCtx = viewCanvas.getContext('2d');
  oCtx = overlayCanvas.getContext('2d');
  video = document.getElementById('video');
  colorCanvas = document.getElementById('colorCanvas');
  cCtx = colorCanvas.getContext('2d');
  workCanvas = document.createElement('canvas'); workCanvas.width=workCanvas.height=RES; wCtx=workCanvas.getContext('2d');
  colorWork = document.createElement('canvas'); colorWork.width=colorWork.height=CRES; cwCtx=colorWork.getContext('2d');
  resizeCanvases();
  iniciarEtiquetasBase();
  document.getElementById('cameraOff').addEventListener('click', startCamera);
  overlayCanvas.addEventListener('touchstart',onPointerDown,{passive:false});
  overlayCanvas.addEventListener('touchmove', onPointerMove,{passive:false});
  overlayCanvas.addEventListener('touchend',  onPointerUp,  {passive:false});
  overlayCanvas.addEventListener('mousedown', onPointerDown);
  overlayCanvas.addEventListener('mousemove', onPointerMove);
  overlayCanvas.addEventListener('mouseup',   onPointerUp);
});

window.addEventListener('resize', resizeCanvases);

function resizeCanvases() {
  if(!viewCanvas) return;
  const zone=document.getElementById('cameraZone');
  const size=Math.min(zone.clientWidth,zone.clientHeight)*0.95;
  [viewCanvas,overlayCanvas].forEach(c=>{
    c.style.width=c.style.height=size+'px'; c.width=c.height=size;
    c.style.position='absolute';
    c.style.left=((zone.clientWidth-size)/2)+'px';
    c.style.top=((zone.clientHeight-size)/2)+'px';
  });
}

// ── CÁMARA ──
async function toggleCamera() { if(state.running) stopCamera(); else await startCamera(); }

async function startCamera() {
  try {
    state.stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:320},height:{ideal:320}},audio:false
    });
    video.srcObject=state.stream; await video.play();
    state.running=true; state.frozen=false;
    document.getElementById('cameraOff').style.display='none';
    document.getElementById('colorChannel').style.display='block';
    viewCanvas.style.display='block'; overlayCanvas.style.display='block';
    actualizarBtnCam();
    renderLoop();
  } catch(e){ showNotif('Sin permiso de cámara'); }
}

function stopCamera() {
  if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
  state.running=false;
  if(animFrame) cancelAnimationFrame(animFrame);
  document.getElementById('cameraOff').style.display='flex';
  viewCanvas.style.display='none'; overlayCanvas.style.display='none';
  document.getElementById('colorChannel').style.display='none';
  actualizarBtnCam();
}

function actualizarBtnCam() {
  const btn=document.getElementById('btnCam');
  if(state.running){ btn.textContent='■ CAM'; btn.classList.add('encendido'); }
  else { btn.textContent='📷 CAM'; btn.classList.remove('encendido'); }
}

function freezeFrame() {
  state.frozen=!state.frozen;
  showNotif(state.frozen?'⏸ CONGELADO':'▶ EN VIVO');
}

// ── RENDER ──
function renderLoop() {
  if(!state.running) return;
  if(!state.frozen && video.readyState>=2) {
    wCtx.drawImage(video,0,0,RES,RES);
    const id=wCtx.getImageData(0,0,RES,RES), d=id.data;
    for(let i=0;i<d.length;i+=4){ const g=Math.round(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]); d[i]=d[i+1]=d[i+2]=g; }
    wCtx.putImageData(id,0,0);
    cwCtx.drawImage(video,0,0,CRES,CRES);
    const cd_=cwCtx.getImageData(0,0,CRES,CRES), cd=cd_.data;
    for(let i=0;i<cd.length;i+=4){
      const br=0.299*cd[i]+0.587*cd[i+1]+0.114*cd[i+2],s=2.2,m=128;
      cd[i]=Math.min(255,Math.max(0,m+(cd[i]-br)*s+(br-m)*0.25));
      cd[i+1]=Math.min(255,Math.max(0,m+(cd[i+1]-br)*s+(br-m)*0.25));
      cd[i+2]=Math.min(255,Math.max(0,m+(cd[i+2]-br)*s+(br-m)*0.25));
    }
    cwCtx.putImageData(cd_,0,0);
    cCtx.imageSmoothingEnabled=false; cCtx.drawImage(colorWork,0,0,16,16);
    const sz=viewCanvas.width; vCtx.imageSmoothingEnabled=false; vCtx.drawImage(workCanvas,0,0,sz,sz);
    renderAcumulacion();
  }
  renderOverlay();
  animFrame=requestAnimationFrame(renderLoop);
}

function renderAcumulacion() {
  const s=viewCanvas.width, cs=s/RES;
  const maxA=Math.max(1,state.totalEtiquetas/(RES*RES)*20);
  vCtx.save();
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++){
    const t=Object.values(state.grid[r][c]).reduce((a,v)=>a+v,0);
    if(t<1) continue;
    vCtx.fillStyle=`rgba(0,255,65,${Math.min(0.3,t/maxA*0.3)})`; vCtx.fillRect(c*cs,r*cs,cs,cs);
  }
  vCtx.restore();
}

function renderOverlay() {
  oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  state.spots.forEach(sp=>{
    oCtx.beginPath(); oCtx.arc(sp.x,sp.y,5,0,Math.PI*2);
    oCtx.fillStyle='rgba(0,255,65,0.85)'; oCtx.fill();
    oCtx.beginPath(); oCtx.arc(sp.x,sp.y,9,0,Math.PI*2);
    oCtx.strokeStyle='rgba(0,255,65,0.25)'; oCtx.lineWidth=1.5; oCtx.stroke();
  });
  const p1=gesto.p1, p2=gesto.p2||gesto.moviendo;
  if(!p1) return;
  oCtx.beginPath(); oCtx.arc(p1.x,p1.y,6,0,Math.PI*2);
  oCtx.fillStyle='rgba(255,184,0,0.9)'; oCtx.fill();
  if(p2){
    oCtx.beginPath(); oCtx.moveTo(p1.x,p1.y); oCtx.lineTo(p2.x,p2.y);
    oCtx.strokeStyle='rgba(0,255,65,0.6)'; oCtx.lineWidth=1.5; oCtx.setLineDash([5,3]); oCtx.stroke(); oCtx.setLineDash([]);
    oCtx.beginPath(); oCtx.arc(p2.x,p2.y,5,0,Math.PI*2); oCtx.fillStyle='rgba(0,255,65,0.7)'; oCtx.fill();
  }
}

// ── INTERACCIÓN ──
function getCanvasPos(e) {
  const rect=overlayCanvas.getBoundingClientRect();
  const t=(e.touches&&e.touches.length)?e.touches[0]:(e.changedTouches&&e.changedTouches.length)?e.changedTouches[0]:e;
  return {x:t.clientX-rect.left, y:t.clientY-rect.top};
}

function onPointerDown(e) {
  if(!state.running) return; e.preventDefault();
  gesto.tapMoved=false;
  const p=getCanvasPos(e);
  gesto.downPos=p; gesto.moviendo=p;
  if(state.primActivo==='SPOT'){ gesto.p1=p; return; }
  if(!state.primActivo){ return; }
  if(gesto.fase===0){ gesto.p1=p; gesto.fase=1; }
}

function onPointerMove(e) {
  e.preventDefault();
  const p=getCanvasPos(e); gesto.moviendo=p;
  const ref=gesto.p1||gesto.downPos; if(!ref) return;
  const dx=p.x-ref.x, dy=p.y-ref.y;
  if(Math.sqrt(dx*dx+dy*dy)>8) gesto.tapMoved=true;
}

function onPointerUp(e) {
  e.preventDefault(); const p=getCanvasPos(e);
  if(state.primActivo==='SPOT'){
    if(!gesto.tapMoved) marcarSpot(p.x,p.y);
    gesto.p1=null; gesto.downPos=null; gesto.moviendo=null; gesto.tapMoved=false; return;
  }
  if(!state.primActivo){
    if(!gesto.tapMoved) freezeFrame();
    gesto.downPos=null; gesto.moviendo=null; gesto.tapMoved=false; return;
  }
  if(gesto.fase===1){
    gesto.p2=p; gesto.fase=2;
    // Auto-ejecutar tras 3s si no hay más input
    clearTimeout(gesto._timer);
    gesto._timer=setTimeout(()=>{ if(gesto.fase===2) ejecutarGesto(); }, 3000);
    ejecutarGesto(); // ejecutar inmediatamente con P1+P2
  }
}

function ejecutarGesto() {
  clearTimeout(gesto._timer);
  if(!gesto.p1||!gesto.p2) return;
  etiquetarElipse({x1:gesto.p1.x,y1:gesto.p1.y,x2:gesto.p2.x,y2:gesto.p2.y}, state.primActivo);
  gesto.fase=0; gesto.p1=gesto.p2=gesto.downPos=gesto.moviendo=null; gesto.tapMoved=false;
}

// ── SPOT ──
function marcarSpot(x,y) {
  const s=viewCanvas.width;
  const col=Math.max(0,Math.min(RES-1,Math.floor(x/s*RES)));
  const row=Math.max(0,Math.min(RES-1,Math.floor(y/s*RES)));
  state.spots.push({id:++state.spotSeq,col,row,x,y});
  state.grid[row][col]['SPOT']=(state.grid[row][col]['SPOT']||0)+1;
  state.totalEtiquetas++;
  actualizarTagStrip('SPOT'); updateFrameCount();
}

// ── ELIPSE ──
function etiquetarElipse(e,prim) {
  const s=viewCanvas.width, cs=s/RES;
  const cx=(e.x1+e.x2)/2, cy=(e.y1+e.y2)/2;
  const rx=Math.max(cs/2,Math.abs(e.x2-e.x1)/2), ry=Math.max(cs/2,Math.abs(e.y2-e.y1)/2);
  let count=0;
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++){
    const px=c*cs+cs/2, py=r*cs+cs/2;
    const dx=(px-cx)/rx, dy=(py-cy)/ry;
    if(dx*dx+dy*dy<=1){ state.grid[r][c][prim]=(state.grid[r][c][prim]||0)+1; count++; state.totalEtiquetas++; }
  }
  if(count>0){ actualizarTagStrip(prim); updateFrameCount(); showNotif(prim+' · '+count+' celdas'); }
}

// ── PRIMITIVOS ──
function selectPrim(btn) {
  document.querySelectorAll('.prim-btn').forEach(b=>b.classList.remove('selected'));
  const prim=btn.dataset.prim;
  state.primActivo=(state.primActivo===prim)?null:prim;
  if(state.primActivo) btn.classList.add('selected');
}

// ── MODOS ──
function setModo(btn) {
  document.querySelectorAll('.modo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); state.modo=btn.dataset.modo;
  showNotif(btn.dataset.modo);
}

// ── ETIQUETAS ──
const ETIQUETAS_BASE=['LUZ','SOMBRA','ROJO','VERDE','AZUL','AMARILLO','MARRÓN','CARNE'];
const tagCounts={};

function iniciarEtiquetasBase() { ETIQUETAS_BASE.forEach(id=>{ tagCounts[id]=0; crearEtiquetaEl(id); }); }

function crearEtiquetaEl(id) {
  if(document.querySelector(`.etiqueta[data-prim="${id}"]`)) return;
  const el=document.createElement('div');
  el.className='etiqueta'; el.dataset.prim=id;
  const led=document.createElement('span'); led.className='led'; el.appendChild(led);
  el.appendChild(document.createTextNode(id));
  const cnt=document.createElement('span'); cnt.className='cnt'; cnt.textContent='0'; el.appendChild(cnt);
  el.addEventListener('click',()=>{
    el.classList.toggle('activa');
    state.primActivo=el.classList.contains('activa')?id:null;
    document.querySelectorAll('.prim-btn').forEach(b=>b.classList.remove('selected'));
    document.querySelectorAll('.etiqueta').forEach(b=>{ if(b!==el) b.classList.remove('activa'); });
  });
  document.getElementById('tagStrip').appendChild(el);
}

function actualizarTagStrip(prim) {
  tagCounts[prim]=(tagCounts[prim]||0)+1;
  if(!document.querySelector(`.etiqueta[data-prim="${prim}"]`)) crearEtiquetaEl(prim);
  const el=document.querySelector(`.etiqueta[data-prim="${prim}"]`);
  el.querySelector('.cnt').textContent=tagCounts[prim]>99?'99+':tagCounts[prim];
  // Actualizar LED según evidencia
  const ev=tagCounts[prim];
  const led=el.querySelector('.led');
  led.className='led';
  if(ev>=UMBRAL_FUERTE) led.classList.add('fuerte');
  else if(ev>=UMBRAL_MEDIA) led.classList.add('media');
  else if(ev>=1) led.classList.add('debil');
}

// ── RECONSTRUCCIÓN ──
function verReconstruccion() {
  if(state.totalEtiquetas===0){showNotif('Etiqueta algo primero');return;}
  showNotif('VER — próximamente');
}

// ── EXPORT ──
function exportarEtiquetas() {
  if(state.totalEtiquetas===0){showNotif('Nada que exportar');return;}
  const celdas=[];
  for(let r=0;r<RES;r++) for(let c=0;c<RES;c++) if(Object.keys(state.grid[r][c]).length) celdas.push({r,c,e:state.grid[r][c]});
  const ci=cCtx.getImageData(0,0,CRES,CRES), cp=[];
  for(let i=0;i<ci.data.length;i+=4) cp.push([ci.data[i],ci.data[i+1],ci.data[i+2]]);
  const data={brillo:{res:RES,total:state.totalEtiquetas,prims:tagCounts,celdas},color:{res:CRES,px:cp},spots:state.spots.map(s=>({id:s.id,col:s.col,row:s.row})),ts:new Date().toISOString()};
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download='ver_'+Date.now()+'.json'; a.click();
  showNotif('JSON · '+celdas.length+' celdas');
}

// ── UTIL ──
function updateFrameCount(){ document.getElementById('frameCount').textContent=state.totalEtiquetas+' etiq'; }
function showNotif(msg,dur=1800){ const n=document.getElementById('notif'); n.textContent=msg; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),dur); }
</script>
